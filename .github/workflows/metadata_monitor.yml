name: OGD Metadata Monitor

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx pandas

      - name: Check data format
        id: check
        run: python scripts/check_data_format.py
        continue-on-error: true

      - name: Open issue on failure
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ OGD data format change detected',
              body: 'The weekly format check (`scripts/check_data_format.py`) failed.\n\nThis likely means MeteoSwiss changed a column name or the STAC asset key pattern.\n\nRun the script locally to see which check failed, then update the notebook and `check_data_format.py` to match the new format.'
            })
